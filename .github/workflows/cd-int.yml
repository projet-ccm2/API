name: Deploy to Integration
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: int-{sha})"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Run integration tests after deployment"
        required: false
        type: boolean
        default: true

jobs:
  deploy-int:
    name: Deploy to Integration
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      docker-image-name: api-api-int
      docker-tag: ${{ github.event.inputs.image-tag || format('int-{0}', github.sha) }}
      artifact-registry-repository: "api-docker-int"
      environment: integration
      cloud-run-service-name: api-int
      service_type: back_prive
      required_env_vars: AUTH_SERVICE_URL,JWT_SECRET,TWITCH_CLIENT_ID,DB_GATEWAY_BASE_URL
    secrets:
      GCP_SA_KEY: ${{ secrets.INT_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.INT_GCP_PROJECT_ID }}
      AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_GATEWAY_BASE_URL: ${{ secrets.DB_GATEWAY_BASE_URL }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
